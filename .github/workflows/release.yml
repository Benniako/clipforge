# ClipForge Release workflow
#
# Creates a GitHub Release when a tag matching "v*" is pushed.
# Builds the frontend and attaches it as a release artifact.
#
# Usage:
#   git tag v0.2.0
#   git push origin v0.2.0
#
# This triggers:
#   1. Run CI checks (lint, unit tests, integration tests, frontend build)
#   2. Build the frontend for the release archive
#   3. Create a GitHub Release with:
#      - Frontend dist (zip)
#      - Source code archive (auto-generated by GitHub)
#      - Docker image pushed to GitHub Container Registry

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # Reuse CI checks before releasing
  check:
    uses: ./.github/workflows/ci.yml

  release:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release archive
        run: |
          # Package the built frontend + a minimal README
          mkdir -p release-artifacts
          cd frontend/dist
          zip -r ../../release-artifacts/clipforge-frontend.zip .
          cd ../..
          # Also create a minimal standalone README for the release
          cp README.md release-artifacts/

      - name: Generate release notes
        id: release_notes
        run: |
          # Generate changelog from git log since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges $PREV_TAG..HEAD)
          fi

          # Categorize commits
          FEAT=$(echo "$LOG" | grep -i "feat:" || echo "")
          FIX=$(echo "$LOG" | grep -i "fix:\|bug:" || echo "")
          DOCS=$(echo "$LOG" | grep -i "docs:" || echo "")
          OTHER=$(echo "$LOG" | grep -iv "feat:\|fix:\|bug:\|docs:" || echo "")

          NOTES="# ClipForge ${{ github.ref_name }}\n"
          NOTES+="\n## What's Changed\n"
          [ -n "$FEAT" ] && NOTES+="\n### 🚀 Features\n$FEAT\n"
          [ -n "$FIX" ] && NOTES+="\n### 🐛 Bug Fixes\n$FIX\n"
          [ -n "$DOCS" ] && NOTES+="\n### 📚 Documentation\n$DOCS\n"
          [ -n "$OTHER" ] && NOTES+="\n### 🔧 Maintenance\n$OTHER\n"

          # Escape for GitHub Actions
          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            release-artifacts/*.zip
            release-artifacts/README.md
          generate_release_notes: false

  # Build and push Docker image to GitHub Container Registry
  docker:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
