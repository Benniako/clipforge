name: CI

on:
  push:
    branches: [main, Product-Alpha]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # Pillow lets the OCR ROI-crop tests run in CI instead of skipping;
        # httpx powers the FastAPI TestClient integration tests.
        run: pip install -r backend/requirements.txt httpx ruff pillow
      - name: Lint
        run: ruff check backend
      - name: Unit tests
        working-directory: backend
        run: python -m tests.test_units
      - name: Integration tests (API + models + CLI)
        working-directory: backend
        run: python -m pytest tests/test_integration.py -v --tb=short

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check Dockerfile syntax
        run: docker build -t clipforge-check . --no-cache 2>&1 | tail -5
      - name: Check compose syntax
        run: docker compose config 2>&1 | tail -5

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
