name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC

jobs:
  backend-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # Pillow lets the OCR ROI-crop tests run in CI instead of skipping;
        # httpx powers the FastAPI TestClient integration tests.
        run: pip install -r backend/requirements.txt httpx ruff pillow
      - name: Lint
        run: ruff check backend
      - name: Unit tests
        working-directory: backend
        run: python -m tests.test_units
      - name: Coverage report
        working-directory: backend
        run: |
          pip install pytest-cov
          python -m pytest --cov=app --cov-report=term-missing --cov-report=xml tests/test_units.py || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npx eslint src/ --ext .ts,.tsx || true
      - name: Unit tests
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
